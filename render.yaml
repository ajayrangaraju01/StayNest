services:
  - type: web
    name: staynest-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py ensure_admin && python manage.py collectstatic --noinput
    startCommand: gunicorn staynest_backend.wsgi:application
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "true"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: staynest-db
          property: connectionString
      - key: DJANGO_EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: DJANGO_DEFAULT_FROM_EMAIL
        value: StayNest <staynest.noreply@gmail.com>
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "true"
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_NAME
        value: StayNest Admin
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: staynest-db
    databaseName: staynest
    user: staynest
